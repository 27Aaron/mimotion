name: Build and Push Docker Image

on:
  push:
    tags:
      - "*"
  release:
    types:
      - published
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish
        required: true
        default: manual

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-push:
    uses: docker/github-builder/.github/workflows/build.yml@v1
    permissions:
      contents: read
      packages: write
      id-token: write
    with:
      output: image
      push: true
      platforms: linux/amd64,linux/arm64
      cache: true
      cache-mode: max
      cache-scope: mimotion
      set-meta-labels: true
      meta-images: ghcr.io/${{ github.repository }}
      meta-tags: |
        type=raw,value=${{ github.event.release.tag_name || inputs.image_tag || github.ref_name }}
        type=raw,value=latest,enable=${{ github.event_name == 'push' || github.event_name == 'release' }}
    secrets:
      registry-auths: |
        - registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
